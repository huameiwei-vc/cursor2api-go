name: Sync to Hugging Face

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync from upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/libaxuan/cursor2api-go.git || true
          git fetch upstream
          # 合并上游代码
          git merge upstream/main --allow-unrelated-histories -m "Sync from upstream" || echo "Already up to date"

      - name: Add HF config to README
        run: |
          # 定义 Hugging Face 必须的元数据头
          HF_HEADER="---
          title: Cursor2API
          emoji: 🚀
          colorFrom: blue
          colorTo: purple
          sdk: docker
          app_port: 7860
          pinned: false
          ---"
          
          # 检查 README.md 是否已经包含元数据（通过检查第一个 ---）
          if ! head -n 1 README.md | grep -q "^---"; then
            echo "Adding HF Metadata to README.md"
            echo -e "$HF_HEADER\n\n$(cat README.md)" > README.md
            git add README.md
            git commit -m "docs: add Hugging Face Space metadata" || echo "No changes to commit"
          else
            echo "HF Metadata already exists, skipping."
          fi

      - name: Push changes to GitHub
        run: git push origin main || echo "Nothing to push to GitHub"

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git remote add hf https://huggingface.co/spaces/$HF_SPACE_NAME || true
          # 使用 x-token 作为用户名是 HF 推荐的标准做法
          git remote set-url hf https://x-token:$HF_TOKEN@huggingface.co/spaces/$HF_SPACE_NAME
          git push hf main:main --force
